<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cihlomat · Rozpočet zdiva z půdorysu</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    /* Oficiálna paleta cihlomat.cz: hnedá/taupe akcent + tmavohnedá + chladné svetlé pozadie */
    --brick:#6e564a;--brick2:#574339;--ink:#241c17;--mut:#857a70;
    --cream:#eef1f5;--paper:#fff;--line:#e7e3de;--green:#2e7d52;--gold:#b8860b;
    --sh:0 1px 3px rgba(50,38,30,.06),0 8px 28px rgba(60,45,35,.07);
  }
  *{box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 50% -200px,#f8fafc,var(--cream));color:var(--ink);margin:0;line-height:1.5;overflow-x:hidden}
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 60px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:30px}
  .logo{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .logo .b{color:var(--brick)}
  .tag{font-size:12px;color:var(--mut);background:#fff;border:1px solid var(--line);padding:4px 10px;border-radius:20px;margin-left:auto}
  h1{font-size:32px;line-height:1.15;letter-spacing:-.8px;margin:0 0 8px;font-weight:800}
  .lede{color:var(--mut);font-size:16px;margin:0 0 24px;max-width:540px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:16px;box-shadow:var(--sh)}
  h3{margin:0 0 14px;font-size:16px;font-weight:700;letter-spacing:-.2px}

  /* drop zone */
  .drop{display:block;border:2.5px dashed #d3cdc5;border-radius:18px;padding:46px 24px;text-align:center;cursor:pointer;
    transition:.18s;background:linear-gradient(#fbfcfd,#f5f7fa)}
  .drop:hover,.drop.drag{border-color:var(--brick);background:#f4f1ef;transform:translateY(-1px)}
  .drop .ic{font-size:40px;line-height:1}
  .drop .t1{font-size:17px;font-weight:600;margin-top:12px}
  .drop .t1 b{color:var(--brick)}
  .drop .t2{font-size:13px;color:var(--mut);margin-top:5px}
  .drop.has{border-style:solid;border-color:var(--green);background:#f4fbf6}
  .fname{color:var(--green);font-weight:600;margin-top:12px;font-size:15px}
  .hints{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
  .hint{font-size:12.5px;color:#6f6357;background:#fff;border:1px solid var(--line);padding:6px 12px;border-radius:20px}
  .hint b{color:var(--green)}

  .btn{background:var(--brick);color:#fff;border:0;border-radius:13px;padding:14px 22px;font-weight:700;cursor:pointer;font-size:15.5px;transition:.15s;box-shadow:0 6px 16px rgba(110,86,74,.26)}
  .btn:hover{background:var(--brick2);transform:translateY(-1px)}
  .btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}
  .btn.full{width:100%;margin-top:18px;font-size:16px}
  .btn.ghost{background:#fff;color:var(--brick);border:1.5px solid var(--line);box-shadow:none}
  .btn.ghost:hover{border-color:var(--brick);background:#f4f2f0}

  /* hero result */
  .hero{background:linear-gradient(135deg,#6e564a,#45362e);color:#fff;border:0;box-shadow:0 10px 34px rgba(60,45,35,.30);overflow:hidden;position:relative}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%)}
  .hero .lab{font-size:13.5px;opacity:.9;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .hero .big{font-size:42px;font-weight:800;letter-spacing:-1.2px;margin:8px 0 2px}
  .hero .rng{font-size:15px;opacity:.95}
  .hero .rng b{font-weight:700}
  .pill{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.16);padding:4px 11px;border-radius:20px;font-size:12.5px;font-weight:600}
  .pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}

  /* tier segmented */
  .seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px}
  .seg button{background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:12px 10px;cursor:pointer;text-align:center;transition:.15s;font-family:inherit}
  .seg button:hover{border-color:#d3cdc5}
  .seg button.on{border-color:var(--brick);background:#f4f1ef;box-shadow:0 4px 12px rgba(110,86,74,.14)}
  .seg .nm{font-weight:700;font-size:14px}
  .seg .ds{font-size:11.5px;color:var(--mut);margin-top:3px;line-height:1.3}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 6px;text-align:left;border-bottom:1px solid var(--line)}
  td.n,th.n{text-align:right;white-space:nowrap}
  th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);font-weight:600}
  tfoot td{font-weight:700;border-top:2px solid #e3ddd6;border-bottom:0;padding-top:12px}
  .muted{color:var(--mut);font-size:13px}

  /* cross-check bar */
  .cc{background:linear-gradient(#f4faf6,#fff);border:1px solid #d3e8da}
  .ccbig{font-size:26px;font-weight:800;letter-spacing:-.6px;margin:2px 0 2px}
  .bar{height:13px;background:#e9efe9;border-radius:8px;overflow:hidden;margin:14px 0 6px;display:flex}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,#6e564a,#45362e)}
  .barleg{display:flex;justify-content:space-between;font-size:12px;color:var(--mut)}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px}
  .grid label{font-size:12.5px;color:var(--mut);display:block;margin-bottom:4px;font-weight:500}
  .grid input,.grid select{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;transition:.15s}
  .grid input:focus,.grid select:focus{outline:0;border-color:var(--brick)}
  .conf{height:8px;background:#eee;border-radius:6px;overflow:hidden;margin-top:7px}
  .conf>i{display:block;height:100%;border-radius:6px;transition:width .4s}
  .chips span{display:inline-block;background:#eeebe7;border-radius:16px;padding:5px 11px;font-size:12px;margin:4px 5px 0 0;color:#6b6258}
  .warn{background:#fff8ec;border:1px solid #f0deb6;color:#7a5a14;border-radius:13px;padding:14px 16px;margin-top:16px;font-size:13.5px}
  .err{background:#fdecec;border:1px solid #f3b3b3;color:#9a2424;border-radius:13px;padding:15px 16px;margin-top:14px;font-size:14px}
  .refuse{background:#f6f3f1;border:1.5px solid #ded5cd;color:#574339;border-radius:16px;padding:22px;margin-top:16px;text-align:center}
  .refuse .ic{font-size:34px}.refuse h4{margin:8px 0 6px;font-size:17px;color:var(--brick)}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;margin-left:6px}
  .badge.on{background:#e3f6ea;color:#1f7a44}.badge.off{background:#f1e6e6;color:#9a4a3a}
  .spin{display:inline-block;width:16px;height:16px;border:3px solid #fff6;border-top-color:#fff;border-radius:50%;animation:s .8s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes s{to{transform:rotate(360deg)}}
  .foot{text-align:center;color:var(--mut);font-size:12px;margin-top:28px}
  .modes{display:flex;gap:8px;margin-bottom:16px}
  .modes button{flex:1;background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:13px 10px;cursor:pointer;font-family:inherit;font-size:14.5px;font-weight:700;color:var(--mut);transition:.15s;text-align:center}
  .modes button:hover{border-color:#d3cdc5}
  .modes button.on{border-color:var(--brick);background:#f4f1ef;color:var(--ink);box-shadow:0 4px 12px rgba(110,86,74,.12)}
  .modes button small{display:block;font-weight:400;font-size:11.5px;color:var(--mut);margin-top:3px}
  @media(max-width:560px){
    .modes button{font-size:13px;padding:11px 8px}
    .modes button small{font-size:11px}
    .wrap{padding:20px 13px 48px}
    h1{font-size:25px}
    .lede{font-size:14.5px}
    .tag{display:none}
    .hero .big{font-size:33px}
    .ccbig{font-size:22px}
    .seg{grid-template-columns:1fr;gap:7px}
    .seg button{display:flex;align-items:center;gap:8px;text-align:left}
    .seg .ds{margin-top:0}
    table{font-size:13px}
    th,td{padding:8px 4px}
    .drop{padding:34px 16px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;
const fmt = n => (n==null?'—':Math.round(n).toLocaleString('cs-CZ').replace(/ /g,' '));

function App(){
  const [files,setFiles]=useState([]);      // pole súborov: plan = 1 fotka/podlažie (viac možných), project = 1 PDF
  const [mode,setMode]=useState('plan');   // 'plan' = foto pôdorysu · 'project' = projektová dokumentácia
  const [drag,setDrag]=useState(false);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [data,setData]=useState(null);
  const [form,setForm]=useState(null);
  const fileRef=useRef();

  async function analyze(e){
    e&&e.preventDefault();
    if(!files.length){setError('Vyber prosím soubor.');return;}
    setError(null);setLoading(true);setData(null);
    try{
      const fd=new FormData();files.forEach(f=>fd.append('plan',f));
      const r=await fetch('/api/analyze',{method:'POST',body:fd});
      let j;
      try{ j=await r.json(); }
      catch(e){
        // server nevrátil JSON (typicky timeout 60s u velkého projektu, nebo chyba serveru)
        setError(mode==='project'
          ? 'Zpracování dokumentace se nepodařilo dokončit (velké PDF může překročit časový limit). Zkuste nahrát jen stránku s půdorysem přízemí (1.NP) jako obrázek, nebo to zkuste znovu.'
          : 'Server vrátil neočekávanou odpověď. Zkuste to prosím znovu, případně s menším/ostřejším obrázkem.');
        setLoading(false);return;
      }
      if(!j.ok){setError(j.error||'Chyba.');setData(j.gate==='REFUSE'?{refuse:j.error}:null);}
      else{setData(j);setForm({...j.params,vyska_podlazi_m:j.extraction.vyska_podlazi_m,tier:j.pricing.tier});}
    }catch(err){setError(''+err);}
    setLoading(false);
  }
  async function recalc(patch){
    const f={...form,...patch};setForm(f);setLoading(true);
    try{
      const r=await fetch('/api/calculate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...f,confidence_0_100:90})});
      const j=await r.json();
      if(j.ok)setData(d=>({...d,pricing:j.pricing,params:j.params,recalced:true}));
    }catch(err){setError(''+err);}
    setLoading(false);
  }
  const applyClaude=()=>recalc(data.claude.suggestions||{});
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const reset=()=>{setFiles([]);setData(null);setError(null);};
  const setM=(m)=>{setMode(m);setFiles([]);setError(null);};
  const showResult=data&&data.ok;

  return <div className="wrap">
    <div className="top">
      <div className="logo"><span className="b">🧱</span> Cihlo<span className="b">mat</span></div>
      <div className="tag">nezávislá kalkulačka · bez preference výrobce</div>
    </div>

    {!showResult ? <>
      {!data && <>
        <h1>Kolik stojí zdivo<br/>vašeho domu?</h1>
        <p className="lede">Nahrajte půdorys (foto/sken) nebo celou projektovou dokumentaci a za pár vteřin
          dostanete orientační odhad ceny zdiva — materiál i práce, včetně rozpětí.</p>
      </>}
      <div className="card">
        <div className="modes">
          <button type="button" className={mode==='plan'?'on':''} onClick={()=>setM('plan')}>📐 Mám půdorys
            <small>foto / sken / 1 strana</small></button>
          <button type="button" className={mode==='project'?'on':''} onClick={()=>setM('project')}>📁 Projektová dokumentace
            <small>celé PDF z projektu</small></button>
        </div>
        <form onSubmit={analyze}>
          <label className={"drop"+(drag?" drag":"")+(files.length?" has":"")}
            onDragOver={e=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);
              const dropped=[...e.dataTransfer.files];
              setFiles(mode==='project'?dropped.slice(0,1):dropped);}}>
            <input ref={fileRef} type="file" multiple={mode==='plan'}
              accept={mode==='project'?'.pdf':'.pdf,.png,.jpg,.jpeg,.webp'} style={{display:'none'}}
              onChange={e=>{const sel=[...e.target.files];setFiles(mode==='project'?sel.slice(0,1):sel);}}/>
            <div className="ic">{files.length?'📑':(mode==='project'?'📁':'📐')}</div>
            <div className="t1">{files.length
              ? (files.length>1?files.length+' podlaží připraveno':'Soubor připraven')
              : (mode==='project'
                ? <><b>Klikněte</b> nebo přetáhněte projektovou dokumentaci</>
                : <><b>Klikněte</b> nebo přetáhněte půdorys sem</>)}</div>
            <div className="t2">{mode==='project'?'PDF z projektu — najdeme v něm půdorys 1.NP':'Foto / sken · můžete nahrát víc podlaží (1 fotka = 1 podlaží)'}</div>
            {files.length>0 && <div className="fname">
              {files.map((f,i)=><div key={i}>✓ {mode==='plan'&&files.length>1?('Podlaží '+(i+1)+': '):''}{f.name}</div>)}</div>}
          </label>
          {mode==='project'
            ? <p className="muted" style={{textAlign:'center',marginTop:14,marginBottom:0,fontSize:13}}>
                V dokumentaci najdeme půdorys přízemí a spočítáme z něj. Z celého projektu umíme přesnější odhad.</p>
            : <>
                <div className="hints">
                  <div className="hint"><b>✓</b> s kótami (rozměry)</div>
                  <div className="hint"><b>✓</b> celý půdorys</div>
                  <div className="hint"><b>✓</b> čitelné stěny</div>
                </div>
                <p className="muted" style={{textAlign:'center',marginTop:10,marginBottom:0,fontSize:13}}>
                  🏠 Patrový dům? Nahrajte fotku <b>každého podlaží</b> — změříme je zvlášť a sečteme
                  (přesnější než odhad horního patra).</p>
              </>}
          <button className="btn full" disabled={loading}>
            {loading?<span><span className="spin"></span>{mode==='project'?'Hledám půdorys v dokumentaci…':'Analyzuji půdorys…'}</span>
              :(mode==='project'?'Najít půdorys a spočítat →':'Spočítat cenu zdiva →')}
          </button>
        </form>
        {error && !(data&&data.refuse) && <div className="err">⚠️ {error}</div>}
      </div>
    </> : <div className="card" style={{display:'flex',alignItems:'center',gap:12,padding:'13px 18px'}}>
      <span style={{fontSize:20}}>📑</span>
      <span style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{files.length?(files.length>1?files.length+' podlaží':files[0].name):'Půdorys'}</span>
      <button className="btn ghost" style={{marginLeft:'auto',padding:'9px 16px',fontSize:14}} onClick={reset}>Nahrát jiný</button>
    </div>}

    {data&&data.refuse && <div className="refuse">
      <div className="ic">🔍</div>
      <h4>Tento půdorys neumíme změřit</h4>
      <p style={{margin:0,fontSize:14}}>{data.refuse}</p>
      <button className="btn ghost" style={{marginTop:16}} onClick={()=>{setFiles([]);setData(null);setError(null);}}>Zkusit jiný půdorys</button>
    </div>}

    {/* INTEGRACE (cihlomat): SEM přijde LEAD-GATE — mezi analýzu a výsledek se vloží
        formulář (e-mail + telefon). Výsledek je už spočítaný a držený v `data` (JSON);
        stačí zobrazení <Result> podmínit stavem leadCaptured (jinak ukázat lead-form),
        a kontakt + data._from_project (= projektová dokumentace = silnější lead) poslat
        do Railway lead-pipeline. Zatím se výsledek zobrazuje rovnou. */}
    {data&&data.ok && <Result data={data} form={form} upd={upd} recalc={recalc} loading={loading} applyClaude={applyClaude}/>}

    <div className="foot">Orientační odhad hrubého zdiva · ceny bez DPH (retail 2025/26) · není závazná nabídka</div>
  </div>;
}

function Result({data,form,upd,recalc,loading,applyClaude}){
  const r=data.pricing, ex=data.extraction, cl=data.claude, cc=r.crosscheck;
  const confColor=ex.confidence_0_100>=70?'#2e7d52':ex.confidence_0_100>=45?'#b8860b':'#c0492b';
  return <div>
    {ex._from_project && !data.multifloor &&
      <div className="warn" style={{marginTop:16,background:'#f2f7f3',borderColor:'#cfe6d6',color:'#2e5d44'}}>
        📁 Z vaší projektové dokumentace ({ex._pages_total} stran) jsme našli a použili <b>stranu {ex._page_idx+1}</b> (půdorys).</div>}
    {data.multifloor && data.floors &&
      <div className="warn" style={{marginTop:16,background:'#f2f7f3',borderColor:'#cfe6d6',color:'#2e5d44'}}>
        🏠 Spočítáno z <b>{data.floors.length} podlaží</b> — každé změřeno zvlášť a sečteno (bez odhadu horního patra):{' '}
        {data.floors.map(fl=>`${fl.label} ~${Math.round(fl.obvod_m)} m obvod`).join(' · ')}.
        {data.skipped && data.skipped.length>0 &&
          <div style={{marginTop:6}}>⚠️ Nepoužité: {data.skipped.map(s=>s.podlazi).join(', ')} — nešlo spolehlivě změřit.</div>}</div>}
    {data.gate==='WARN' && data.gate_msg &&
      <div className="warn" style={{marginTop:16}}>ℹ️ {data.gate_msg}</div>}
    {r.warnings && r.warnings.length>0 &&
      <div className="warn" style={{marginTop:16}}>🚩 <b>Kontrola geometrie:</b>
        <ul style={{margin:'8px 0 0',paddingLeft:20}}>{r.warnings.map((w,i)=><li key={i}>{w}</li>)}</ul></div>}

    {/* HERO */}
    <div className="card hero">
      <div className="lab">🧱 Hrubé zdivo (materiál + práce) · {r.tier_popis}</div>
      <div className="big">{fmt(r.zdivo_total)} Kč</div>
      <div className="rng">reálné rozpětí <b>{fmt(r.range_lo)} – {fmt(r.range_hi)} Kč</b> <span style={{opacity:.8}}>(±{r.band_pct} %)</span></div>
      <div className="pills">
        <span className="pill">📐 {r.wall_area_total} m² stěn</span>
        <span className="pill">bez zateplení</span>
        {data.recalced && <span className="pill">✓ přepočítáno</span>}
      </div>
    </div>

    {/* VARIANTA SKLADBY STĚNY — když si nejsme jistí (500 mm = plné zdivo vs zdivo+zateplení) */}
    {r.assumed_skladba && r.skladba_variants &&
      <div className="card">
        <h3>Skladba obvodové stěny <span style={{fontWeight:400,color:'#b8860b',fontSize:14}}>· nejisté</span></h3>
        <p className="muted" style={{marginTop:0}}>Stěna má <b>zateplení</b>, ale na výkresu <b>není uvedeno</b>, kolik z tloušťky je nosné zdivo a kolik izolace. Nebyli jsme si jistí — proto počítáme <b>obě varianty</b>. Vyberte tu, která odpovídá skutečnosti (najdete v řezu / skladbě):</p>
        <div className="seg">
          {[['zateplene','Zdivo + zateplení','~'+(r.skladba_variants.zateplene.obvod_th||300)+' mm zdiva + izolace',r.skladba_variants.zateplene],
            ['plne','Plné zdivo','~'+(r.skladba_variants.plne.obvod_th||500)+' mm zdiva (bez izolace)',r.skladba_variants.plne]].map(([k,nm,ds,vv])=>
            <button key={k} className={(form.skladba_volba||'zateplene')===k?'on':''} disabled={loading}
              onClick={()=>recalc({skladba_volba:k})}>
              <div className="nm">{nm}</div><div className="ds">{ds}</div>
              <div style={{marginTop:6,fontWeight:700,fontSize:15}}>{fmt(vv.zdivo_total)} Kč</div></button>)}
        </div>
        <p className="muted" style={{marginTop:10,marginBottom:0,fontSize:13}}>Rozdíl je <b>{fmt(Math.abs(r.skladba_variants.plne.zdivo_total-r.skladba_variants.zateplene.zdivo_total))} Kč</b> — proto se vyplatí ověřit typ zdiva. Většina novostaveb je „zdivo + zateplení".</p>
      </div>}

    {/* CROSS-CHECK */}
    {cc && <div className="card cc">
      <h3>🔎 Pro kontext — celá hrubá stavba</h3>
      <div className="ccbig">{fmt(cc.min)} – {fmt(cc.max)} Kč</div>
      <div className="muted">odhad pro ~{cc.plocha_m2} m² ({fmt(cc.unit_avg)} Kč/m² podlahy)</div>
      <div className="bar"><i style={{width:Math.min(100,cc.zdivo_podiel_pct)+'%'}}></i></div>
      <div className="barleg"><span>🧱 zdivo ~{cc.zdivo_podiel_pct} %</span><span>+ základy, stropy, střecha</span></div>
      <p className="muted" style={{marginTop:12,marginBottom:0}}>{cc.note}</p>
    </div>}

    {/* VÝKAZ */}
    <div className="card">
      <h3>Výkaz výměr</h3>
      <table><thead><tr><th>Položka</th><th className="n">Množ.</th><th className="n">Kč/j.</th><th className="n">Celkem</th></tr></thead>
        <tbody>{r.items.map((i,k)=><tr key={k}>
          <td>{i.name}<div className="muted">{i.detail}</div></td>
          <td className="n">{i.qty} {i.unit}</td><td className="n">{fmt(i.price)}</td><td className="n">{fmt(i.total)}</td></tr>)}
          <tr><td>{r.labor_item.name}<div className="muted">{r.labor_item.detail}</div></td>
            <td className="n">{r.labor_item.qty} {r.labor_item.unit}</td><td className="n">{fmt(r.labor_item.price)}</td>
            <td className="n">{fmt(r.labor_total)}</td></tr></tbody>
        <tfoot><tr><td colSpan="3">Zdivo celkem (materiál + práce)</td><td className="n">{fmt(r.zdivo_total)} Kč</td></tr></tfoot>
      </table>
    </div>

    {/* Co jsme vyčetli z výkresu */}
    <div className="card">
      <h3>📋 Co jsme z výkresu vyčetli</h3>
      <p className="muted" style={{marginTop:0}}>Rozměry: <b>{ex.meritko_source}</b> · spolehlivost odhadu <b style={{color:confColor}}>{ex.confidence_0_100}/100</b></p>
      <div className="conf"><i style={{width:ex.confidence_0_100+'%',background:confColor}}></i></div>
      <p className="muted" style={{marginTop:8,marginBottom:0}}>Zdivo:{' '}
        {r.zdivo_zdroj==='legenda'
          ? <span>📋 z legendy materiálů{r.obvod_material && <> — <b>{r.obvod_material}</b></>}</span>
          : r.zdivo_zdroj==='kóta'
          ? <span>📐 tloušťka z kóty na výkrese</span>
          : <span>≈ odhad (na výkrese neuvedeno)</span>}</p>
      {r.pricky_geom_m!=null && r.pricky_zdroj && r.pricky_zdroj.indexOf('plochy')>-1 &&
        <p className="muted" style={{marginTop:6,marginBottom:0}}>📐 Příčky jsme upřesnili z <b>ploch místností</b> (geometrie):
          vizuální odhad {r.pricky_ai_m} m · výpočet z ploch {r.pricky_geom_m} m → počítáme {r.used_params.pricky_m} m.</p>}
      {ex.note && <p className="muted" style={{fontStyle:'italic',marginTop:8,marginBottom:6}}>„{ex.note}"</p>}
      {ex.co_potvrdit&&ex.co_potvrdit.length>0 && <div><p className="muted" style={{marginTop:10,marginBottom:4}}>Doporučujeme ověřit:</p>
        <div className="chips">{ex.co_potvrdit.map((c,i)=><span key={i}>{c}</span>)}</div></div>}
    </div>

    {/* EDIT */}
    <div className="card">
      <h3>📝 Upravit hodnoty a přepočítat</h3>
      <div className="grid">
        <F label="Obvodové zdivo (m)" k="obvod_m" form={form} upd={upd}/>
        <F label="Vnitřní nosné stěny (m)" k="vnitrni_nosne_m" form={form} upd={upd}/>
        <F label="Příčky (m)" k="pricky_m" form={form} upd={upd}/>
        <F label="Výška podlaží (m)" k="vyska_podlazi_m" form={form} upd={upd}/>
        <F label="Počet podlaží" k="pocet_podlazi" form={form} upd={upd}/>
        <F label="Počet oken" k="pocet_oken" form={form} upd={upd}/>
        <F label="Počet dveří" k="pocet_dveri" form={form} upd={upd}/>
        <F label="Zastavěná plocha (m²)" k="zastavena_plocha_m2" form={form} upd={upd}/>
        <F label="Užitná plocha (m²)" k="uzitna_plocha_m2" form={form} upd={upd}/>
      </div>
      <button className="btn" style={{marginTop:18}} disabled={loading} onClick={()=>recalc({})}>
        {loading?'Počítám…':'Přepočítat'}</button>
    </div>

    <div className="warn">⚠️ Orientační odhad, ceny bez DPH (retail 2025/26). Zahrnuje obvodové zdivo, příčky,
      překlady, věnec a práce. <b>Neobsahuje:</b> {r.neobsahuje}. Nezávislý odhad bez preference výrobce.
      Před objednávkou ověřte s rozpočtářem.</div>
  </div>;
}

const F=({label,k,form,upd})=><div><label>{label}</label>
  <input type="number" step="any" value={form[k]??''} onChange={e=>upd(k,e.target.value===''?null:parseFloat(e.target.value))}/></div>;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
